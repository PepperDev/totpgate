name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      release:
        description: Create a GitHub release and publish artifacts
        type: boolean
        default: false
      tag:
        description: Semver tag (e.g. v1.2.3). Leave empty to auto-increment from latest.
        type: string
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y indent
      - run: make
      - run: make test
      - run: make style && git diff --exit-code
      - name: Coverage
        run: make coverage 2>&1 | tee coverage_output.txt
      - name: Coverage summary
        run: |
          {
            echo '## Code Coverage'
            echo ''
            echo '| Module | Lines | Coverage |'
            echo '|--------|------:|---------:|'
            awk -v sq="'" '
              /^File / {
                n = split($0, a, sq)
                module = a[2]
                sub(/^src\//, "", module)
                sub(/\.c$/, "", module)
              }
              /^Lines executed:/ {
                if (seen[module]++) next
                split($0, a, ":")
                rest = a[2]
                split(rest, b, "%")
                split(b[2], c, "of")
                printf("| %s | %d | %s%% |\n", module, c[2] + 0, b[1])
              }
            ' coverage_output.txt
          } >> "$GITHUB_STEP_SUMMARY"

  musl-toolchain:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.hash.outputs.cache-key }}
    steps:
      - name: Query musl.cc versions
        id: hash
        run: |
          TOOLCHAINS="x86_64-linux-musl-cross i686-linux-musl-cross arm-linux-musleabihf-cross arm-linux-musleabi-cross aarch64-linux-musl-cross"
          echo "toolchains=$TOOLCHAINS" >> "$GITHUB_OUTPUT"
          MIRROR_BASE="https://github.com/musl-cc/musl.cc/releases/download/v0.0.1"
          # Try musl.cc first, then mirror fallback
          if curl -sfLI --connect-timeout 5 --max-time 10 "https://musl.cc/" >/dev/null 2>&1; then
            BASE="https://musl.cc"
          elif curl -sfLI --connect-timeout 5 --max-time 10 "$MIRROR_BASE/SHA512SUMS" >/dev/null 2>&1; then
            BASE="$MIRROR_BASE"
          else
            echo "musl.cc and mirror unreachable, skipping toolchain"
            echo "cache-key=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          CURL="curl -sSfL --connect-timeout 10 --max-time 30 --retry 1"
          if SUMS=$($CURL "$BASE/SHA512SUMS" 2>/dev/null); then
            KEY=$(echo "$SUMS" | sha256sum | cut -c1-16)
          else
            KEY=$(for tc in $TOOLCHAINS; do
              $CURL -I "$BASE/$tc.tgz" 2>/dev/null | grep -i "^last-modified:" | tail -1 | tr -d '\r'
            done | md5sum | cut -c1-16)
          fi
          echo "cache-key=musl-${KEY:-unknown}" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        id: cache
        if: steps.hash.outputs.cache-key != ''
        with:
          path: /opt/musl
          key: ${{ steps.hash.outputs.cache-key }}

      - name: Download musl toolchains
        if: steps.cache.outputs.cache-hit != 'true' && steps.hash.outputs.cache-key != ''
        run: |
          sudo mkdir -p /opt/musl
          for tc in ${{ steps.hash.outputs.toolchains }}; do
            echo "Downloading $tc from ${{ steps.hash.outputs.base }}..."
            curl -sfL --connect-timeout 10 --max-time 120 --retry 1 "${{ steps.hash.outputs.base }}/$tc.tgz" -o "/tmp/$tc.tgz" && sudo tar xzf "/tmp/$tc.tgz" -C /opt/musl && rm "/tmp/$tc.tgz"
          done

  build:
    needs: [test, musl-toolchain]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')
    strategy:
      matrix:
        target:
          - name: x86_64
            musl_arch: x86_64-linux-musl
            deb_arch: amd64
            rpm_arch: x86_64
          - name: i686
            musl_arch: i686-linux-musl
            deb_arch: i386
            rpm_arch: i386
          - name: armhf
            musl_arch: arm-linux-musleabihf
            deb_arch: armhf
            rpm_arch: armv7hl
          - name: armv7
            musl_arch: arm-linux-musleabi
            deb_arch: armel
            rpm_arch: armv7hl
          - name: aarch64
            musl_arch: aarch64-linux-musl
            deb_arch: arm64
            rpm_arch: aarch64
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            case "$TAG" in
              v*) ;;
              *) TAG="v$TAG" ;;
            esac
          else
            LAST=$(git tag | sort -V | tail -1)
            if [ -z "$LAST" ]; then
              TAG="v0.1.0"
            else
              TAG=$(echo "$LAST" | awk -F. '/^v/ {printf "v%d.%d.%d", $1+0, $2+0, $3+1}')
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Check toolchain availability
        if: needs.musl-toolchain.outputs.cache-key == ''
        run: |
          echo "musl.cc and mirror were unreachable during the musl-toolchain job."
          echo "Cannot cross-compile without toolchains."
          exit 1

      - name: Restore musl toolchain
        if: needs.musl-toolchain.outputs.cache-key != ''
        uses: actions/cache/restore@v4
        with:
          path: /opt/musl
          key: ${{ needs.musl-toolchain.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Build
        run: |
          export PATH="/opt/musl/${{ matrix.target.musl_arch }}-cross/bin:$PATH"
          make CC="${{ matrix.target.musl_arch }}-gcc" CFLAGS="-std=c99 -pedantic -pedantic-errors -O3 -Wall -Wextra -flto -D_POSIX_C_SOURCE=200112L -D_DEFAULT_SOURCE" LDFLAGS="-static -flto"
          ${{ matrix.target.musl_arch }}-strip bin/totpgated bin/totpgate

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp bin/totpgated bin/totpgate dist/
          cp man/totpgated.1 man/totpgate.1 dist/

      - name: Package tar.xz
        run: |
          tar -cJf "totpgate-${{ matrix.target.name }}-${{ steps.version.outputs.version }}.tar.xz" -C dist .

      - name: Package .deb
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DEB_ARCH="${{ matrix.target.deb_arch }}"
          PKGDIR="totpgate_${VERSION}_${DEB_ARCH}"
          mkdir -p "$PKGDIR/DEBIAN" "$PKGDIR/usr/bin" "$PKGDIR/usr/share/man/man1"
          install -m 755 dist/totpgated "$PKGDIR/usr/bin/"
          install -m 755 dist/totpgate "$PKGDIR/usr/bin/"
          install -m 644 dist/totpgated.1 "$PKGDIR/usr/share/man/man1/"
          install -m 644 dist/totpgate.1 "$PKGDIR/usr/share/man/man1/"
          gzip -9 "$PKGDIR/usr/share/man/man1/totpgated.1"
          gzip -9 "$PKGDIR/usr/share/man/man1/totpgate.1"
          {
            echo "Package: totpgate"
            echo "Version: $VERSION"
            echo "Section: net"
            echo "Priority: optional"
            echo "Architecture: $DEB_ARCH"
            echo "Maintainer: Tiago Augusto Pimenta"
            echo "Description: Single Packet Authorization via TOTP"
            echo " A lightweight port knocking daemon for Linux. Listens on UDP for a valid"
            echo " TOTP token and temporarily opens a TCP port via direct netlink manipulation."
          } > "$PKGDIR/DEBIAN/control"
          dpkg-deb --build "$PKGDIR" >/dev/null

      - name: Install rpm
        run: sudo apt-get install -y rpm 2>/dev/null

      - name: Package .rpm
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RPM_ARCH="${{ matrix.target.rpm_arch }}"
          RPMDIR="$HOME/rpmbuild"
          mkdir -p "$RPMDIR"/{SPECS,RPMS,SRPMS,BUILD,SOURCES}
          {
            echo "Name: totpgate"
            echo "Version: $VERSION"
            echo "Release: 1"
            echo "Summary: Single Packet Authorization via TOTP"
            echo "License: MIT"
            echo "Group: Applications/System"
            echo "%description"
            echo "A lightweight port knocking daemon for Linux. Listens on UDP for a valid"
            echo "TOTP token and temporarily opens a TCP port via direct netlink manipulation."
            echo ""
            echo "%install"
            echo "mkdir -p \$RPM_BUILD_ROOT/usr/bin"
            echo "mkdir -p \$RPM_BUILD_ROOT/usr/share/man/man1"
            echo "install -m 755 %{_sourcedir}/totpgated \$RPM_BUILD_ROOT/usr/bin/"
            echo "install -m 755 %{_sourcedir}/totpgate \$RPM_BUILD_ROOT/usr/bin/"
            echo "install -m 644 %{_sourcedir}/totpgated.1 \$RPM_BUILD_ROOT/usr/share/man/man1/"
            echo "install -m 644 %{_sourcedir}/totpgate.1 \$RPM_BUILD_ROOT/usr/share/man/man1/"
            echo ""
            echo "%files"
            echo "/usr/bin/totpgated"
            echo "/usr/bin/totpgate"
            echo "/usr/share/man/man1/totpgated.1*"
            echo "/usr/share/man/man1/totpgate.1*"
          } > "$RPMDIR/SPECS/totpgate.spec"
          cp dist/* "$RPMDIR/SOURCES/"
          HOST_ARCH=$(rpm --eval "%{_arch}" 2>/dev/null || uname -m)
          rpmbuild -ba --define "_topdir $RPMDIR" --define "__strip /bin/true" "$RPMDIR/SPECS/totpgate.spec"
          cp "$RPMDIR/RPMS/$HOST_ARCH/totpgate-$VERSION-1.$HOST_ARCH.rpm" \
             "totpgate-$VERSION-1.$RPM_ARCH.rpm"

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: totpgate-${{ matrix.target.name }}-${{ steps.version.outputs.version }}
          path: |
            totpgate-${{ matrix.target.name }}-${{ steps.version.outputs.version }}.tar.xz
            totpgate_${{ steps.version.outputs.version }}_${{ matrix.target.deb_arch }}.deb
            totpgate-${{ steps.version.outputs.version }}-1.${{ matrix.target.rpm_arch }}.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            case "$TAG" in
              v*) ;;
              *) TAG="v$TAG" ;;
            esac
          else
            LAST=$(git tag | sort -V | tail -1)
            if [ -z "$LAST" ]; then
              TAG="v0.1.0"
            else
              TAG=$(echo "$LAST" | awk -F. '/^v/ {printf "v%d.%d.%d", $1+0, $2+0, $3+1}')
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: |
          {
            echo "## Changelog"
            echo ""
            PREV=$(git describe --tags --abbrev=0 2>/dev/null || true)
            if [ -n "$PREV" ]; then
              git log "$PREV..HEAD" --oneline --no-decorate
            else
              git log --oneline --no-decorate
            fi
          } > changelog.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: totpgate-*-${{ steps.tag.outputs.version }}
          merge-multiple: true

      - name: Create tag
        if: github.event_name != 'release'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create release
        if: github.event_name == 'workflow_dispatch'
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes-file changelog.md \
            *.tar.xz *.deb *.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to existing release
        if: github.event_name == 'release'
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            *.tar.xz *.deb *.rpm --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
